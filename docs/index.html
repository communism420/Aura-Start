<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aura Start</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f5;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #667085;
        --border: #d9dde3;
        --accent: #0f766e;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1f2021;
          --panel: #262728;
          --text: #f2f4f7;
          --muted: #a6adbb;
          --border: #44484f;
          --accent: #79d7d0;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(100% - 32px, 640px);
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
        padding: 32px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 5vw, 2.5rem);
        line-height: 1.2;
      }

      p {
        margin: 0 auto;
        max-width: 34rem;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      .actions {
        display: grid;
        gap: 12px;
        margin-top: 28px;
      }

      .action {
        display: block;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 18px;
        background: color-mix(in srgb, var(--panel), var(--accent) 4%);
        color: var(--text);
        text-align: left;
        text-decoration: none;
        transition:
          border-color 0.16s ease,
          transform 0.16s ease,
          background-color 0.16s ease;
      }

      .action:hover,
      .action:focus-visible {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--panel), var(--accent) 9%);
        transform: translateY(-1px);
      }

      .action strong {
        display: block;
        color: var(--accent);
        font-size: 1.05rem;
      }

      .action span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aura Start</h1>
      <p>A local-first Chromium new tab extension for user-owned link groups, exportable backups, and optional Google Drive sync.</p>
      <div class="actions" aria-label="Aura Start links">
        <a class="action" href="privacy-policy.html">
          <strong>Privacy Policy</strong>
          <span>Read how Aura Start stores local data and handles optional Google Drive sync.</span>
        </a>
        <a class="action" href="https://github.com/communism420/Aura-Start" rel="noopener noreferrer">
          <strong>Source Code</strong>
          <span>Open the public Aura Start repository on GitHub.</span>
        </a>
      </div>
    </main>
  </body>
</html>
