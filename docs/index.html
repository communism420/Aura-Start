<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=privacy-policy.html">
    <link rel="canonical" href="privacy-policy.html">
    <title>Aura Start Privacy Policy</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f5;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #667085;
        --border: #d9dde3;
        --accent: #0f766e;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1f2021;
          --panel: #262728;
          --text: #f2f4f7;
          --muted: #a6adbb;
          --border: #44484f;
          --accent: #79d7d0;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(100% - 32px, 640px);
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
        padding: 32px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 5vw, 2.5rem);
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aura Start Privacy Policy</h1>
      <p>
        Redirecting to the privacy policy. If nothing happens,
        <a href="privacy-policy.html">open it here</a>.
      </p>
    </main>
  </body>
</html>
